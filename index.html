<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Karla:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
    <script src="javascript/script.js"></script>
    <title>My Portfolio</title>

  <body>
    <header>
      <div class="header-content">
        <div class="lang-switch" onclick="toggleLanguage()">
          <div class="switch-bg" id="switch-bg"></div>
          <span class="lang-option active" id="lang-en">EN</span>
          <span class="lang-option" id="lang-de">DE</span>
        </div>
        <div class="nav">
          <a href="" class="active">About me</a>
          <a href="">Skills</a>
          <a href="">Projects</a>
        </div>
      </div>
      <div class="logo-container">
        <img
          src="icons/logo_1.svg"
          alt="Waldemar Giesbrecht Logo (Full)"
          class="logo-image logo-solid"
        />

        <img
          src="icons/logo_2.svg"
          alt="Waldemar Giesbrecht Logo (Outline)"
          class="logo-image logo-outline"
        />
      </div>
    </header>
    <main></main>
    <footer></footer>
  </body>
</html>
